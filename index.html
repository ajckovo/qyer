    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px 0;
            border-bottom: 2px solid #4a4a8a;
        }
        .header h1 {
            font-size: 2.5rem;
            color: #e94560;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(233, 69, 96, 0.5);
        }
        .header p {
            font-size: 1.1rem;
            color: #a5d8ff;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }
        .filter-group label {
            font-size: 1.1rem;
            color: #fff;
        }
        .filter-group select {
            padding: 8px 15px;
            border-radius: 5px;
            border: 2px solid #4a4a8a;
            background: rgba(0,0,0,0.5);
            color: #fff;
            font-size: 1rem;
            outline: none;
        }
        #randomBtn {
            padding: 12px 30px;
            font-size: 1.2rem;
            background: linear-gradient(45deg, #e94560, #ff2e63);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all .3s ease;
            box-shadow: 0 4px 15px rgba(233,69,96,.4);
        }
        #randomBtn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(233,69,96,.6);
        }
        #ghostBtn {
            padding: 12px 30px;
            font-size: 1.2rem;
            background: linear-gradient(45deg, #ffd166, #ff9f1c);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all .3s ease;
            box-shadow: 0 4px 15px rgba(255,209,102,.4);
        }
        #ghostBtn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(255,209,102,.6);
        }
        /* 新增：随机选图按钮样式 */
        #mapBtn {
            padding: 12px 30px;
            font-size: 1.2rem;
            background: linear-gradient(45deg, #00f5d4, #00bb9f);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all .3s ease;
            box-shadow: 0 4px 15px rgba(0,245,212,.4);
        }
        #mapBtn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,245,212,.6);
        }
        #mapBtn:disabled {
            background: linear-gradient(45deg, #666, #999);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
            opacity: 0.7;
        }
        
        /* 核心修改1：间距放大2倍 - gap从40px → 120px（原基础上×3，实现「再多两倍」） */
        .teams-result {
            display: flex;
            align-items: center; /* 垂直居中 */
            justify-content: center;
            gap: 120px; /* 关键：原40px → 120px（增加2倍） */
            margin: 40px 0;
            flex-wrap: wrap; /* 移动端自动换行 */
        }
        
        /* 核心修改2：队伍卡片缩小50%（原宽度500px → 250px） */
        .team-card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 15px; /* 内边距同步缩小 */
            width: 250px; /* 原500px → 缩小50%为250px */
            box-shadow: 0 8px 32px rgba(0,0,0,.2);
            border: 1px solid rgba(255,255,255,.2);
        }
        
        .team-card h2 {
            text-align: center;
            font-size: 1.2rem; /* 标题字体缩小适配 */
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 2px solid;
        }
        .team1 h2 { border-color: #00f5d4; color: #00f5d4; }
        .team2 h2 { border-color: #e94560; color: #e94560; }
        
        /* 核心修改3：VS图标内边距放大2倍 - 0 20px → 0 60px（增加2倍） */
        .vs-icon {
            font-size: 2.5rem;
            color: #e94560;
            font-weight: bold;
            text-shadow: 0 0 15px rgba(233, 69, 96, 0.8);
            padding: 0 60px; /* 原0 20px → 0 60px（增加2倍） */
            /* VS图标动画 */
            animation: vsPulse 1.5s infinite ease-in-out;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        /* 新增：地图展示样式 */
        .map-display {
            width: 180px;
            height: 120px;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #00f5d4;
            box-shadow: 0 0 15px rgba(0,245,212,0.6);
            opacity: 0;
            transform: scale(0.8);
            transition: all .4s ease .2s;
        }
        .map-display.show {
            opacity: 1;
            transform: scale(1);
        }
        .map-display img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .map-name {
            font-size: 1rem;
            color: #00f5d4;
            text-shadow: 0 0 10px rgba(0,245,212,0.8);
            text-align: center;
        }
        /* VS图标呼吸动画 */
        /* @keyframes vsPulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.8; }
        } */
        
        /* 角色网格适配缩小后的卡片 */
        .hero-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px; /* 间距同步缩小 */
            justify-items: center;
        }
        .hero-slot {
            text-align: center;
            padding: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            transition: transform .3s ease;
            position: relative;
            width: 120px; /* 原200px → 同步缩小为120px */
        }
        /* 序号样式适配 */
        .hero-slot .number {
            position: absolute;
            top: -5px;
            left: -5px;
            background: #4a4a8a;
            color: #fff;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: bold;
            border: 2px solid #fff;
        }
        .hero-slot.ghost .number {
            background: #ffd166;
            color: #16213e;
        }
        .hero-slot.ghost {
            background: rgba(255,209,102,0.2);
            border: 2px solid #ffd166;
        }
        .hero-slot.ghost::after {
            content: "👻 内鬼";
            position: absolute;
            top: -8px;
            right: -8px;
            background: #ffd166;
            color: #16213e;
            font-size: 0.6rem;
            padding: 2px 6px;
            border-radius: 8px;
            font-weight: bold;
        }
        .hero-slot:hover { transform: scale(1.05); }
        .hero-slot img {
            width: 50px; /* 原80px → 缩小为50px */
            height: 50px;
            border-radius: 50%;

            box-shadow: 0 0 10px rgba(255,209,102,0.8);
        }

        .hero-slot .role {
            font-size: 0.7rem; color: #a5d8ff;
            background: rgba(74,74,138,.5);
            padding: 2px 4px; border-radius: 6px; margin-top: 3px;
        }
        
        .hero-list {

            grid-template-columns: repeat(auto-fill, minmax(200px,1fr));
            gap: 20px; margin-top: 40px;
        }
        .hero-item {

        }

        .empty-tip { text-align: center; font-size: 1.2rem; color: #a5d8ff; padding: 40px 0; }
        .ghost-tip {
            text-align: center;
            font-size: 1.5rem;
            color: #ffd166;

            text-shadow: 0 0 10px rgba(255,209,102,0.8);
        }

        @media (max-width:768px){

            .team-card { width: 90%; max-width: 250px; }

            .vs-icon {

            }
            .map-display {
                width: 140px;
                height: 90px;
            }
            .hero-list { grid-template-columns: repeat(auto-fill, minmax(150px,1fr)); }
        }
    </style>
</head>

// 生成一队：5人、队内不重复、必含四种定位、定位位置随机
function makeOnePool(pool){
    let team = [];
    let usedNames = new Set();

    // 第一步：收集四种定位各一个（确保类型齐全）
    let roleHeroes = [];
    for(let r of mustRoles){
        let sameRole = pool.filter(x=>x.role===r && !usedNames.has(x.name));
        let pick = sameRole[Math.floor(Math.random()*sameRole.length)];
        roleHeroes.push(pick);
        usedNames.add(pick.name);
    }

    // 第二步：随机补1个队内不重复的英雄
    let extraHero;
    do {
        let idx = Math.floor(Math.random()*pool.length);
        extraHero = pool[idx];
    } while(usedNames.has(extraHero.name));
    roleHeroes.push(extraHero);
    usedNames.add(extraHero.name);

    // 第三步：打乱顺序（核心修改：让四种定位的位置完全随机）
    let shuffledTeam = roleHeroes.sort(() => Math.random() - 0.5);
    
    return shuffledTeam;
}

function generate(){
    let all = [...heroes];
    let sel = roleFilter.value;
    if(sel !== "all") all = all.filter(h=>h.role===sel);

    // 检查：四种定位是否都有可用英雄
    let ok = mustRoles.every(r=>all.some(h=>h.role===r));
    if(!ok){
        teamsResult.innerHTML = `<div class="empty-tip">当前筛选缺少某种定位，请选【全部角色】</div>`;
        ghostBtn.disabled = true; // 禁用内鬼按钮
        mapBtn.disabled = true; // 禁用选图按钮
        ghostTip.style.display = "none";
        return;
    }

    let t1 = makeOnePool(all);
    let t2 = makeOnePool(all);

    // 保存当前队伍数据
    currentTeams.team1 = t1;
    currentTeams.team2 = t2;

    // 启用内鬼按钮和选图按钮
    ghostBtn.disabled = false;
    mapBtn.disabled = false;
    // 隐藏内鬼提示
    ghostTip.style.display = "none";
    // 重置当前地图
    currentMap = null;

    renderTeams(t1,t2);
}

                <div class="name">${h.name}</div>
                <div class="role">${h.role}</div>
            </div>
        `).join("");
    }
    // 队伍容器中插入VS图标 + 地图展示区域
    teamsResult.innerHTML = `
        <div class="team-card team1"><h2>第一队</h2><div class="hero-grid">${html(t1, 1)}</div></div>
        <div class="vs-icon">
         <!-- 新增：地图展示区域 -->
            <div class="map-display" id="mapDisplay">
                <img src="" alt="">
            </div>
             <div class="map-name" id="mapName"></div>
            VS
        </div>
        <div class="team-card team2"><h2>第二队</h2><div class="hero-grid">${html(t2, 2)}</div></div>
    `;
    // 入场动画适配
    let cards = document.querySelectorAll(".team-card");
    let vsIcon = document.querySelector(".vs-icon");
    // 初始化隐藏
    cards.forEach((c,i)=>{
        c.style.opacity=0;
        c.style.transform=`translateX(${i?50:-50}px)`;
        setTimeout(()=>{
            c.style.transition="all .4s ease";
            c.style.opacity=1;
            c.style.transform="translateX(0)";
        },100*(i+1));
    });
    // VS图标延迟显示动画
    vsIcon.style.opacity=0;
    vsIcon.style.transform="scale(0)";
    setTimeout(()=>{
        vsIcon.style.transition="all .4s ease .3s"; // 延迟0.3s显示
        vsIcon.style.opacity=1;
        vsIcon.style.transform="scale(1)";
    }, 300);
}

// 新增：随机选择地图并展示
function selectRandomMap() {
    // 随机选择一个地图
    const randomIndex = Math.floor(Math.random() * maps.length);
    currentMap = maps[randomIndex];
    
    // 获取地图展示元素
    const mapDisplay = document.getElementById("mapDisplay");
    const mapName = document.getElementById("mapName");
    
    // 设置地图图片和名称
    mapDisplay.querySelector("img").src = currentMap.img;
    mapDisplay.querySelector("img").alt = currentMap.name;
    mapName.textContent = currentMap.name;
    
    // 显示地图（添加动画类）
    mapDisplay.classList.add("show");
    
    // 地图展示动画
    mapDisplay.animate([
        { transform: 'scale(1)' },
        { transform: 'scale(1.05)' },
        { transform: 'scale(1)' }
    ], {
        duration: 1500,
        iterations: 1
    });
}

// 每队随机选取一名内鬼
function selectGhost(){
    // 清除之前的内鬼标记
    document.querySelectorAll(".hero-slot.ghost").forEach(slot => {
        slot.classList.remove("ghost");
    });

    // 存储两队内鬼信息
    let ghostInfo = {
        team1: {},
        team2: {}
    };

    // 为第一队选内鬼
    const randomIndex1 = Math.floor(Math.random() * 5);
    ghostInfo.team1.index = randomIndex1;
    ghostInfo.team1.hero = currentTeams.team1[randomIndex1];
    
    // 为第二队选内鬼
    const randomIndex2 = Math.floor(Math.random() * 5);
    ghostInfo.team2.index = randomIndex2;
    ghostInfo.team2.hero = currentTeams.team2[randomIndex2];
    
    // 标记第一队内鬼
    const ghostSlot1 = document.querySelector(`.hero-slot[data-team="1"][data-index="${randomIndex1}"]`);
    ghostSlot1.classList.add("ghost");
    // 标记第二队内鬼
    const ghostSlot2 = document.querySelector(`.hero-slot[data-team="2"][data-index="${randomIndex2}"]`);
    ghostSlot2.classList.add("ghost");

    // 显示内鬼提示（包含序号）
    ghostTip.style.display = "block";
    ghostTip.textContent = `👻 内鬼是：第一队${randomIndex1 + 1}号 ${ghostInfo.team1.hero.name}（${ghostInfo.team1.hero.role}）、第二队${randomIndex2 + 1}号 ${ghostInfo.team2.hero.name}（${ghostInfo.team2.hero.role}）`;
    
    // 内鬼标记动画（依次播放）
    ghostSlot1.animate([
        { transform: 'scale(1)' },
        { transform: 'scale(1.1)' },
        { transform: 'scale(1)' }
    ], {
        duration: 1000,
        iterations: 2
    });
    
    setTimeout(() => {
        ghostSlot2.animate([
            { transform: 'scale(1)' },
            { transform: 'scale(1.1)' },
            { transform: 'scale(1)' }
        ], {
            duration: 1000,
            iterations: 2
        });
    }, 500);
}

roleFilter.addEventListener("change",()=>{
    let v=roleFilter.value;
    let list = v==="all"?heroes:heroes.filter(h=>h.role===v);
    renderHeroList(list);
});
randomBtn.addEventListener("click",generate);
ghostBtn.addEventListener("click", selectGhost);
mapBtn.addEventListener("click", selectRandomMap); // 新增：选图按钮点击事件
window.onload=()=>renderHeroList(heroes);
</script>
</body>
</html>
